name: Auto-Update WC Scores

on:
  schedule:
    - cron: "0 13 * * *"    # 8:00 AM CT (1 PM UTC) once daily
  workflow_dispatch:          # also lets you trigger it manually from GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and patch scores
        id: patch
        run: |
          python update_scores.py && echo "changed=true" >> $GITHUB_OUTPUT || echo "changed=false" >> $GITHUB_OUTPUT

      - name: Commit and push if scores changed
        if: steps.patch.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Auto-update WC scores $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
